<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Admin Dashboard - LIMAT Registration</title>
  <link rel="icon" type="image/png" href="../assets/img/lingaya-logo.png">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav>
    <div class="container">
      <h1>
        <img src="../assets/img/lingaya-logo.png" alt="Lingaya's Group" class="logo-img" width="50" height="50">
        <span>LIMAT Admin Dashboard</span>
      </h1>
      <div class="nav-right">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">
    <div class="dashboard-header" style="position: relative; z-index: 2;">
      <h2>🎯 Admin Dashboard</h2>
      <p>Manage students, courses, lecturers, and monitor registrations</p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Navigation Tabs -->
    <div class="modal-tabs" style="margin-bottom: 2rem;">
      <div class="modal-tabs-header">
        <button class="tab-btn active" onclick="switchTab('students')">👥 Students</button>
        <button class="tab-btn" onclick="switchTab('courses')">📚 Courses</button>
        <button class="tab-btn" onclick="switchTab('lecturers')">👨‍🏫 Lecturers</button>
        <button class="tab-btn" onclick="switchTab('registrations')">📋 Registrations</button>
      </div>

      <!-- Students Tab -->
      <div id="studentsTab" class="tab-content modal-tabs-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;">
          <h3 style="margin: 0;">Student Management</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('addStudentModal')" style="width: auto;">+ Add Student</button>
        </div>
        <div id="studentsList" class="loading">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Courses Tab -->
      <div id="coursesTab" class="tab-content modal-tabs-content hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;">
          <h3 style="margin: 0;">Course Management</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('addCourseModal')" style="width: auto;">+ Add Course</button>
        </div>
        <div id="coursesList" class="loading">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Lecturers Tab -->
      <div id="lecturersTab" class="tab-content modal-tabs-content hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;">
          <h3 style="margin: 0;">Lecturer Management</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('addLecturerModal')" style="width: auto;">+ Add Lecturer</button>
        </div>
        <div id="lecturersList" class="loading">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Registrations Tab -->
      <div id="registrationsTab" class="tab-content modal-tabs-content hidden">
        <h3 style="margin: 0 0 1.5rem 0;">All Registrations</h3>
        <div id="registrationsList" class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Student Modal -->
  <div class="modal" id="addStudentModal">
    <div class="modal-content">
      <div class="modal-header">Add New Student</div>
      <form id="addStudentForm" style="padding: 1rem;">
        <div class="form-group">
          <label for="department">Department</label>
          <select id="department" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;">
            <option value="" disabled selected>Select Department</option>
            <option value="CSE">Computer Science & Engineering (CSE)</option>
            <option value="AIDS">Artificial Intelligence & Data Science (AIDS)</option>
            <option value="AIML">AI & Machine Learning (AIML)</option>
            <option value="CIVIL">Civil Engineering (CIVIL)</option>
            <option value="ECE">Electronics & Communication (ECE)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="collegeId">College ID</label>
          <input type="text" id="collegeId" required>
        </div>
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="studentPassword">Password</label>
          <input type="password" id="studentPassword" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" onclick="closeModal('addStudentModal')">Cancel</button>
          <button type="submit" class="btn btn-success">Add Student</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Course Modal -->
  <div class="modal" id="addCourseModal">
    <div class="modal-content">
      <div class="modal-header">Add New Course</div>
      <form id="addCourseForm" style="padding: 1rem;">
        <div class="form-group">
          <label for="courseCode">Course Code</label>
          <input type="text" id="courseCode" placeholder="e.g., CS101" required>
        </div>
        <div class="form-group">
          <label for="courseName">Course Name</label>
          <input type="text" id="courseName" placeholder="e.g., Introduction to Programming" required>
        </div>
        <div class="form-group">
          <label for="credits">Credits</label>
          <input type="number" id="credits" value="3">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" onclick="closeModal('addCourseModal')">Cancel</button>
          <button type="submit" class="btn btn-success">Add Course</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Lecturer Modal -->
  <div class="modal" id="addLecturerModal">
    <div class="modal-content">
      <div class="modal-header">Add New Lecturer</div>
      <form id="addLecturerForm" style="padding: 1rem;">
        <div class="form-group">
          <label for="lecturerName">Lecturer Name</label>
          <input type="text" id="lecturerName" required>
        </div>
        <div class="form-group">
          <label for="courseSelect">Course</label>
          <select id="courseSelect" required>
            <option value="">Select a course</option>
          </select>
        </div>
        <div class="form-group">
          <label for="maxSlots">Max Slots</label>
          <input type="number" id="maxSlots" value="60">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" onclick="closeModal('addLecturerModal')">Cancel</button>
          <button type="submit" class="btn btn-success">Add Lecturer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
