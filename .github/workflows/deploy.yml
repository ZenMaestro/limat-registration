name: Deploy LIMAT to Cloud

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    
    - name: Install Root Dependencies
      run: npm install --legacy-peer-deps || npm install
    
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install --legacy-peer-deps || npm install
    
    - name: Verify Backend Files
      run: |
        echo "✅ Checking backend structure:"
        ls -la backend/
        echo ""
        echo "✅ Checking server.js exists:"
        test -f backend/server.js && echo "Found server.js"
        echo ""
        echo "✅ Node modules:"
        ls -la backend/node_modules 2>/dev/null | head -5 || echo "Installing..."
    
    - name: Run Syntax Check
      run: |
        cd backend
        node -c server.js && echo "✅ Syntax valid"

  deploy:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deployment Status
      run: |
        echo "🚀 LIMAT Deployment Status"
        echo "========================"
        echo "✅ Build Successful"
        echo "✅ Dependencies Verified"
        echo "✅ Backend Ready"
        echo ""
        echo "📋 Configuration:"
        echo "  - Language: Node.js 20.x"
        echo "  - Runtime: Express.js"
        echo "  - Database: MySQL"
        echo "  - Start: npm start (from backend folder)"
        echo ""
        echo "🎯 Next Steps:"
        echo "  1. Railway.app auto-deploys on git push"
        echo "  2. Environment variables (DB_*, JWT_SECRET) must be set in Railway"
        echo "  3. MongoDB will be auto-provisioned"
        echo ""
        echo "📚 Guides:"
        echo "  - DEPLOYMENT_QUICK_START.md"
        echo "  - DEPLOYMENT_GUIDE.md"
      run: echo "❌ Pipeline failed. Check logs above."

  # Alternative: Deploy to Railway.app
  deploy-railway:
    name: Deploy to Railway (Optional)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy using Railway
      run: |
        echo "To deploy to Railway:"
        echo "1. Go to https://railway.app"
        echo "2. Connect GitHub repo"
        echo "3. Set environment variables"
        echo "4. Railway deploys on every push automatically"
